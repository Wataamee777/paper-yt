name: Android CI

on:
  push:
    branches: ["main"] # mainにマージされたら自動リリース
  pull_request:

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # タグとリリース作成に必要
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # すべてのタグを取得するために必要

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Get Version Name
        id: get_version
        run: |
          # "=" の前後の空白を考慮し、ダブルクォートの中身だけを抽出
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | sed 's/.*= "\(.*\)".*/\1/')
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: gradle :app:assembleDebug --stacktrace

      # 2. リリース用ビルド（Secretsがある場合のみ）
      - name: Decode keystore
        if: github.ref == 'refs/heads/main'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > release-keystore.jks
          fi

      - name: Build Signed Release
        if: github.ref == 'refs/heads/main'
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -f "release-keystore.jks" ]; then
            gradle :app:assembleRelease --stacktrace
          else
            echo "Keystore not found, skipping release build."
          fi

      # 3. タグの自動生成とGitHub Release作成
      - name: Auto Tag and Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            ## PaperYT 自動リリース
            
            今回のバージョン: **v${{ steps.get_version.outputs.version }}**
            
            ⚠️ **インストール時の注意**
            通常の利用には **`release`** と名前がついているAPKを選択してください。
            `debug` 版は開発・検証用です。
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
